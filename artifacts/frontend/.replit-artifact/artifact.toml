kind = "mobile"
previewPath = "/frontend/"
title = "Twitter App"
version = "1.0.0"
id = "artifacts/frontend"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/frontend/" ]
localPort = 20664

[services.development]
run = "pnpm --filter @workspace/frontend run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/frontend", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/frontend", "run", "serve" ]

[services.env]
PORT = "20664"
BASE_PATH = "/frontend/"
